version: '3.8'

services:
  authly-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: authly-api
    restart: unless-stopped
    ports:
      - "5180:5180"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5180
      # Redis connection string được đọc từ appsettings.Production.json trên server
      - AuthlyDatabase__ConnectionString=mongodb://host.docker.internal:27017
      - AuthlyDatabase__DatabaseName=AuthlyDb
      - AuthlyDatabase__UsersCollectionName=users
      - Jwt__Key=YOUR_SECRET_JWT_KEY
      - Jwt__Issuer=http://localhost:5180
      - Jwt__Audience=http://localhost:5180
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      # Mount appsettings.Production.json từ server, không cần build lại image khi đổi config
      - ./appsettings.Production.json:/app/appsettings.Production.json:ro
    networks:
      - authly-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  redis:
    image: redis:7-alpine
    container_name: authly-redis
    restart: unless-stopped
    ports:
      - "6379:6379"   # Bỏ dòng này nếu không muốn expose Redis ra ngoài
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - authly-network

networks:
  authly-network:
    driver: bridge
